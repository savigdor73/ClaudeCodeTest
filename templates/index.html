<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmallBiz Hub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    :root {
      --sidebar-width: 260px;
      --header-height: 60px;
      /* Theme defaults (Blue) */
      --bs-primary: #0d6efd;
      --bs-primary-rgb: 13, 110, 253;
      --bs-link-color: #0d6efd;
      --bs-link-hover-color: #0a58ca;
      --theme-accent-soft: rgba(13,110,253,.13);
      --theme-sidebar-bg: #1a2236;
      --theme-sidebar-brand-bg: #111827;
      --theme-sidebar-text: #c8d0e0;
      --theme-sidebar-role: #8899aa;
      --theme-body-bg: #f4f6fb;
      --theme-auth-grad: linear-gradient(135deg,rgba(13,110,253,.13),rgba(102,16,242,.13));
    }

    body { background: var(--theme-body-bg); font-family: 'Segoe UI', sans-serif; }

    /* ── Sidebar ─────────────────────────────── */
    #sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: var(--sidebar-width); background: var(--theme-sidebar-bg);
      color: var(--theme-sidebar-text); z-index: 1040;
      display: flex; flex-direction: column;
      transition: transform .25s;
    }
    #sidebar .sidebar-brand {
      height: var(--header-height); display: flex; align-items: center;
      padding: 0 1.25rem; background: var(--theme-sidebar-brand-bg); gap: .6rem;
      font-size: 1.15rem; font-weight: 700; color: #fff;
    }
    #sidebar .sidebar-brand i { color: var(--bs-primary); font-size: 1.4rem; }
    #sidebar .nav-link {
      color: var(--theme-sidebar-text); padding: .6rem 1.25rem;
      border-radius: .375rem; margin: .1rem .5rem;
      display: flex; align-items: center; gap: .6rem; transition: all .15s;
    }
    #sidebar .nav-link:hover, #sidebar .nav-link.active {
      background: var(--theme-accent-soft); color: #fff;
    }
    #sidebar .nav-link.active { border-left: 3px solid var(--bs-primary); }
    #sidebar .sidebar-footer {
      margin-top: auto; padding: 1rem;
      border-top: 1px solid #ffffff18;
    }
    #sidebar .sidebar-footer .user-info { font-size: .85rem; }
    #sidebar .sidebar-footer .user-name { font-weight: 600; color: #fff; }
    #sidebar .sidebar-footer .user-role { color: var(--theme-sidebar-role); font-size: .75rem; }

    /* ── Header ──────────────────────────────── */
    #header {
      position: fixed; top: 0; right: 0;
      left: var(--sidebar-width); height: var(--header-height);
      background: #fff; border-bottom: 1px solid #e5e9f2;
      display: flex; align-items: center; padding: 0 1.5rem;
      z-index: 1030; gap: 1rem; box-shadow: 0 1px 4px #0001;
      transition: left .25s;
    }
    #header .page-title { font-weight: 700; font-size: 1.1rem; color: #1a2236; }
    #header .breadcrumb { font-size: .8rem; margin: 0; }
    #header .header-actions { margin-left: auto; display: flex; align-items: center; gap: .75rem; }

    /* ── Main ────────────────────────────────── */
    #main-content {
      margin-left: var(--sidebar-width);
      margin-top: var(--header-height);
      padding: 1.75rem; min-height: calc(100vh - var(--header-height));
      transition: margin-left .25s;
    }

    /* ── Auth pages ──────────────────────────── */
    #auth-wrapper {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--theme-auth-grad);
    }
    .auth-card { width: 100%; max-width: 420px; }

    /* ── Cards ───────────────────────────────── */
    .stat-card { border: none; border-radius: .75rem; box-shadow: 0 2px 12px #0001; }
    .stat-card .card-body { padding: 1.5rem; }
    .stat-icon {
      width: 52px; height: 52px; border-radius: .6rem;
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
    }

    /* ── Tables ──────────────────────────────── */
    .table th { font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; color: #6c757d; }
    .badge-role { font-size: .7rem; padding: .3em .6em; }

    /* ── Spinner overlay ─────────────────────── */
    .btn-loading { position: relative; pointer-events: none; }
    .btn-loading .btn-text { opacity: 0; }
    .btn-loading::after {
      content: ''; position: absolute; width: 16px; height: 16px;
      top: 50%; left: 50%; margin: -8px 0 0 -8px;
      border: 2px solid transparent; border-top-color: currentColor;
      border-radius: 50%; animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Color Themes ────────────────────────── */
    [data-theme="slate"] {
      --bs-primary: #6366f1; --bs-primary-rgb: 99, 102, 241;
      --bs-link-color: #6366f1; --bs-link-hover-color: #4f46e5;
      --theme-accent-soft: rgba(99,102,241,.13);
      --theme-sidebar-bg: #1e1e2e; --theme-sidebar-brand-bg: #13131f;
      --theme-sidebar-text: #c4c4d4; --theme-sidebar-role: #7878a0;
      --theme-body-bg: #f1f5f9;
      --theme-auth-grad: linear-gradient(135deg,rgba(99,102,241,.13),rgba(79,70,229,.13));
    }
    [data-theme="emerald"] {
      --bs-primary: #10b981; --bs-primary-rgb: 16, 185, 129;
      --bs-link-color: #10b981; --bs-link-hover-color: #059669;
      --theme-accent-soft: rgba(16,185,129,.13);
      --theme-sidebar-bg: #064e3b; --theme-sidebar-brand-bg: #022c22;
      --theme-sidebar-text: #a7f3d0; --theme-sidebar-role: #6ee7b7;
      --theme-body-bg: #f0fdf4;
      --theme-auth-grad: linear-gradient(135deg,rgba(16,185,129,.13),rgba(5,150,105,.13));
    }
    [data-theme="violet"] {
      --bs-primary: #8b5cf6; --bs-primary-rgb: 139, 92, 246;
      --bs-link-color: #8b5cf6; --bs-link-hover-color: #7c3aed;
      --theme-accent-soft: rgba(139,92,246,.13);
      --theme-sidebar-bg: #2e1065; --theme-sidebar-brand-bg: #1e0746;
      --theme-sidebar-text: #ddd6fe; --theme-sidebar-role: #c4b5fd;
      --theme-body-bg: #faf5ff;
      --theme-auth-grad: linear-gradient(135deg,rgba(139,92,246,.13),rgba(124,58,237,.13));
    }
    [data-theme="sunset"] {
      --bs-primary: #f97316; --bs-primary-rgb: 249, 115, 22;
      --bs-link-color: #f97316; --bs-link-hover-color: #ea580c;
      --theme-accent-soft: rgba(249,115,22,.13);
      --theme-sidebar-bg: #431407; --theme-sidebar-brand-bg: #1c0903;
      --theme-sidebar-text: #fdba74; --theme-sidebar-role: #fb923c;
      --theme-body-bg: #fff7ed;
      --theme-auth-grad: linear-gradient(135deg,rgba(249,115,22,.13),rgba(234,88,12,.13));
    }

    /* ── Theme Swatches ──────────────────────── */
    .theme-swatch {
      display: flex; flex-direction: column; align-items: center; gap: .4rem;
      padding: .6rem .9rem; border: 2px solid #e2e8f0; border-radius: .75rem;
      background: none; cursor: pointer; transition: all .15s; min-width: 80px;
    }
    .theme-swatch:hover { border-color: var(--swatch-color); }
    .theme-swatch.active {
      border-color: var(--swatch-color);
      box-shadow: 0 0 0 3px rgba(var(--bs-primary-rgb), .2);
    }
    .swatch-circle {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--swatch-color); box-shadow: 0 2px 6px rgba(0,0,0,.15);
    }
    .swatch-label { font-size: .75rem; font-weight: 500; color: #555; }

    /* ── Mobile ──────────────────────────────── */
    @media (max-width: 768px) {
      #sidebar { transform: translateX(-100%); }
      #sidebar.open { transform: none; }
      #header { left: 0; }
      #main-content { margin-left: 0; }
      #sidebar-overlay {
        display: none; position: fixed; inset: 0;
        background: #0008; z-index: 1039;
      }
      #sidebar.open ~ #sidebar-overlay { display: block; }
    }
  </style>
</head>
<body>

<!-- ── Auth Pages (shown when not logged in) ── -->
<div id="auth-wrapper" style="display:none">
  <div class="auth-card card shadow-lg p-4" id="auth-card">
    <!-- Injected by JS -->
  </div>
</div>

<!-- ── App Shell (shown when logged in) ── -->
<div id="app-shell" style="display:none">

  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-brand">
      <i class="bi bi-grid-3x3-gap-fill"></i>
      SmallBiz Hub
    </div>
    <ul class="nav flex-column mt-2 px-1" id="nav-links">
      <li class="nav-item">
        <a class="nav-link" href="#dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
      </li>
      <li class="nav-item" id="nav-users-item">
        <a class="nav-link" href="#users"><i class="bi bi-people"></i> Users</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#profile"><i class="bi bi-person-circle"></i> Profile</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#pricing"><i class="bi bi-tags"></i> Pricing</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#settings"><i class="bi bi-gear"></i> Settings</a>
      </li>
    </ul>
    <div class="sidebar-footer">
      <div class="d-flex align-items-center gap-2">
        <div class="bg-primary rounded-circle d-flex align-items-center justify-content-center text-white"
             style="width:38px;height:38px;font-size:.95rem" id="sidebar-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="sidebar-name">—</div>
          <div class="user-role" id="sidebar-role">—</div>
        </div>
        <button class="btn btn-sm btn-outline-secondary ms-auto" id="btn-logout" title="Logout">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Sidebar overlay for mobile -->
  <div id="sidebar-overlay"></div>

  <!-- Header -->
  <header id="header">
    <button class="btn btn-sm btn-light d-md-none" id="btn-toggle-sidebar">
      <i class="bi bi-list fs-5"></i>
    </button>
    <div>
      <div class="page-title" id="header-title">Dashboard</div>
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb mb-0" id="breadcrumb">
          <li class="breadcrumb-item active">Dashboard</li>
        </ol>
      </nav>
    </div>
    <div class="header-actions">
      <button class="btn btn-sm btn-light position-relative" title="Notifications">
        <i class="bi bi-bell"></i>
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size:.6rem">0</span>
      </button>
      <div class="dropdown">
        <button class="btn btn-sm btn-light dropdown-toggle" data-bs-toggle="dropdown">
          <i class="bi bi-person-circle me-1"></i>
          <span id="header-username">—</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><a class="dropdown-item" href="#profile"><i class="bi bi-person me-2"></i>Profile</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item text-danger" href="#" id="header-logout"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
        </ul>
      </div>
    </div>
  </header>

  <!-- Main content area -->
  <main id="main-content">
    <div id="router-outlet">
      <!-- Pages rendered here -->
    </div>
  </main>

  <footer class="text-center text-muted py-3" style="font-size:.75rem;margin-left:var(--sidebar-width)">
    SmallBiz Hub v1.0.0 &bull; &copy; 2026
  </footer>

</div>

<!-- Toast container -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999" id="toast-container"></div>

<!-- Confirm Modal -->
<div class="modal fade" id="confirmModal" tabindex="-1">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title" id="confirmTitle">Confirm</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="confirmBody">Are you sure?</div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-danger btn-sm" id="confirmOk">Confirm</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
<script src="/static/app.js" type="module"></script>
</body>
</html>
